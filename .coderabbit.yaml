language: en-US

tone_instructions: >
  Be concise and direct. Start every walkthrough comment with a quality rating
  heading: ## ⭐ Rating: X/5 (1 = critical, 5 = excellent). This MUST appear
  above the <details> walkthrough section, not inside it.

reviews:
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "convex/_generated/**"
      instructions: "Auto-generated by Convex. Do not review."
    - path: "convex/**"
      instructions: "Convex server functions. Check for proper input validation with `v` validators and correct `ctx.db` usage."
    - path: "app/**"
      instructions: "Next.js 16 App Router. Uses Convex for data, WorkOS AuthKit for auth."
