language: en-US

tone_instructions: >
  Be concise and direct. Start every review summary with the quality rating
  as the very first line, formatted as: "## Rating: X/5" (1 = critical issues,
  5 = excellent). This must be the first thing visible when opening the PR.
  Then provide the rest of the review below it.

reviews:
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "convex/_generated/**"
      instructions: "Auto-generated by Convex. Do not review."
    - path: "convex/**"
      instructions: "Convex server functions. Check for proper input validation with `v` validators and correct `ctx.db` usage."
    - path: "app/**"
      instructions: "Next.js 16 App Router. Uses Convex for data, WorkOS AuthKit for auth."
