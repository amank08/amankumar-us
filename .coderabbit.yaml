language: en-US

tone_instructions: "Be concise and direct. Focus on actionable feedback."

reviews:
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "**"
      instructions: "Do not flag missing JSDoc, docstrings, or comment coverage. TypeScript types and descriptive names are sufficient documentation in this codebase."
    - path: "convex/_generated/**"
      instructions: "Auto-generated by Convex. Do not review."
    - path: "convex/**"
      instructions: "Convex server functions. Check for proper input validation with `v` validators and correct `ctx.db` usage."
    - path: "app/**"
      instructions: "Next.js 16 App Router. Uses Convex for data, WorkOS AuthKit for auth."
