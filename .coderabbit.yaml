language: en-US

tone_instructions: >
  Be concise and direct. At the very end of the walkthrough summary, include a
  quality rating from 1 to 5 (1 = critical issues, 5 = excellent). Render it
  prominently as a large heading using this exact format on its own line:

  ## ⭐ Rating: X/5

  Do NOT include any other rating badges or scores elsewhere in the review.

reviews:
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "convex/_generated/**"
      instructions: "Auto-generated by Convex. Do not review."
    - path: "convex/**"
      instructions: "Convex server functions. Check for proper input validation with `v` validators and correct `ctx.db` usage."
    - path: "app/**"
      instructions: "Next.js 16 App Router. Uses Convex for data, WorkOS AuthKit for auth."
