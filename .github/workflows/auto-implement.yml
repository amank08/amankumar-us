name: Auto-Implement Issue

on:
  issues:
    types: [labeled]

jobs:
  implement:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'auto-implement')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Implement with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read issue #${{ github.event.issue.number }} carefully.

            Title: ${{ github.event.issue.title }}
            Body: ${{ github.event.issue.body }}

            Implement this feature following the conventions in CLAUDE.md.
            Make sure `npm run lint` and `npm run typecheck` pass before finishing.
          max_turns: 15
