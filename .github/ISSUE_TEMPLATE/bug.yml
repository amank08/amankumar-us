name: Bug Report
description: Report a bug on amankumar.us
labels: ["bug"]
body:
  - type: input
    id: summary
    attributes:
      label: Bug Summary
      placeholder: e.g., Sign-in button returns 404
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should have happened?

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What happened instead?
